<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Program — KP1/9A.2/0T/045/SS/23-24 | CCTV Project Timeline</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #13161d;
    --surface2: #1a1e28;
    --border: #252a38;
    --text: #e8eaf0;
    --muted: #5a6070;
    --accent: #4f9cf9;
    --accent2: #f97b4f;
    --accent3: #4fd9a0;
    --bar-design: #4f9cf9;
    --bar-install: #f97b4f;
    --bar-other: #9b7ef9;
    --today: #f9d44f;
    --header-h: 80px;
    --row-h: 44px;
    --label-w: 260px;
    --period-w: 50px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 0;
  }

  /* ── HEADER ── */
  .page-header {
    padding: 32px 40px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
  }

  .header-left h1 {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .header-left p {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.5px;
  }

  .header-right {
    display: flex;
    gap: 24px;
    align-items: center;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* ── CHART WRAPPER ── */
  .chart-outer {
    padding: 24px 40px 40px;
    overflow-x: auto;
  }

  .chart-container {
    display: flex;
    flex-direction: column;
    min-width: 1300px;
  }

  /* ── MONTH HEADERS ── */
  .month-header-row {
    display: flex;
    margin-left: var(--label-w);
    margin-left: calc(var(--label-w) + var(--period-w));
    border-bottom: 1px solid var(--border);
    margin-bottom: 0;
  }

  .month-cell {
    flex: none;
    width: calc(var(--period-w) * 4);
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 6px 2px;
    border-right: 1px solid var(--border);
    position: relative;
  }

  .month-cell::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: transparent;
  }

  .month-cell.has-today::after {
    background: var(--today);
  }

  /* Week sub-headers */
  .week-header-row {
    display: flex;
    margin-left: calc(var(--label-w) + var(--period-w));
    border-bottom: 1px solid var(--border);
  }

  .week-cell {
    flex: none;
    width: var(--period-w);
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: #363d52;
    padding: 4px 0;
    border-right: 1px solid var(--border);
  }

  .week-cell.today-col {
    color: var(--today);
    font-weight: 600;
  }

  /* ── ROWS ── */
  .row {
    display: flex;
    align-items: center;
    border-bottom: 1px solid var(--border);
    min-height: var(--row-h);
    position: relative;
    transition: background 0.15s;
  }

  .row:hover {
    background: rgba(255,255,255,0.02);
  }

  .row.section-header {
    background: var(--surface2);
    min-height: 32px;
  }

  .row-label {
    flex: none;
    width: var(--label-w);
    padding: 0 16px 0 0;
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    position: sticky;
    left: 0;
    background: var(--bg);
    z-index: 2;
  }

  .row.section-header .row-label {
    background: var(--surface2);
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .row-period {
    flex: none;
    width: var(--period-w);
    font-family: 'DM Mono', monospace;
    font-size: 8.5px;
    color: var(--muted);
    text-align: right;
    padding-right: 8px;
    white-space: nowrap;
    overflow: hidden;
    position: sticky;
    left: var(--label-w);
    background: var(--bg);
    z-index: 2;
  }

  .row.section-header .row-period {
    background: var(--surface2);
  }

  /* ── GRID CELLS ── */
  .grid-area {
    display: flex;
    flex: 1;
    position: relative;
    height: var(--row-h);
    align-items: center;
  }

  .row.section-header .grid-area {
    height: 32px;
  }

  .grid-col {
    flex: none;
    width: var(--period-w);
    height: 100%;
    border-right: 1px solid var(--border);
    position: relative;
  }

  .grid-col.month-start {
    border-right: 1px solid #2a3040;
  }

  .grid-col.today-col {
    background: rgba(249, 212, 79, 0.04);
    border-right: 1px solid rgba(249,212,79,0.3);
  }

  /* ── GANTT BAR ── */
  .gantt-bar {
    position: absolute;
    height: 22px;
    border-radius: 4px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 1;
    display: flex;
    align-items: center;
    padding: 0 8px;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    font-weight: 500;
    color: rgba(0,0,0,0.7);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: default;
    transition: filter 0.2s, height 0.2s;
  }

  .gantt-bar:hover {
    filter: brightness(1.15);
    height: 26px;
  }

  /* ── TODAY LINE ── */
  .today-line {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 2px;
    background: var(--today);
    z-index: 10;
    pointer-events: none;
  }

  .today-line::before {
    content: 'TODAY';
    position: absolute;
    top: -20px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    color: var(--today);
    letter-spacing: 1px;
    white-space: nowrap;
  }

  /* ── TOOLTIP ── */
  .tooltip {
    display: none;
    position: fixed;
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 10px 14px;
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text);
    pointer-events: none;
    z-index: 1000;
    max-width: 280px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }

  .tooltip.visible { display: block; }
  .tooltip-title { font-weight: 500; font-family: 'Syne', sans-serif; font-size: 12px; margin-bottom: 6px; }
  .tooltip-period { color: var(--muted); font-size: 10px; }

  /* ── STATS BAR ── */
  .stats-row {
    display: flex;
    gap: 32px;
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .stat-value {
    font-size: 24px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -1px;
  }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .divider {
    width: 1px;
    background: var(--border);
    margin: 0 8px;
  }

  .progress-bar-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 6px;
    max-width: 300px;
  }

  .progress-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
  }

  .progress-track {
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    border-radius: 99px;
    transition: width 1s ease;
  }
</style>
</head>
<body>

<div class="page-header">
  <div class="header-left">
    <h1>CCTV &amp; Access Control — Work Programme</h1>
    <p>REF: KP1/9A.2/0T/045/SS/23-24 &nbsp;·&nbsp; WORK SCHEDULE &nbsp;·&nbsp; JUNE 2024 – APRIL 2026</p>
  </div>
  <div class="header-right">
    <div class="legend-item"><div class="legend-dot" style="background:var(--bar-design)"></div>Design / Procurement</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--bar-install)"></div>Installation Phase</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--bar-other)"></div>Other / Testing</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--today)"></div>Today</div>
  </div>
</div>

<div class="stats-row" id="statsRow"></div>

<div class="chart-outer">
  <div class="chart-container" id="chartContainer"></div>
</div>

<div class="tooltip" id="tooltip">
  <div class="tooltip-title" id="ttTitle"></div>
  <div class="tooltip-period" id="ttPeriod"></div>
</div>

<script>
// ── DATA ──
const projectStart = new Date('2024-06-01');
const projectEnd   = new Date('2026-04-30');
const today        = new Date('2026-03-28');

const tasks = [
  { id: 'kickoff',  label: 'Project Kick-Off Meeting & Handover', period: '03/06/24–19/06/24', start: '2024-06-03', end: '2024-06-19', type: 'other',   section: null },
  { id: 'sec1',     label: 'DESIGN',                               period: '',                  start: null,        end: null,        type: 'section', section: null },
  { id: 'pdr',      label: 'Preliminary Design Review (PDR)',       period: '24/06/24–05/07/24', start: '2024-06-24', end: '2024-07-05', type: 'design',  section: 'design' },
  { id: 'procImp',  label: 'Procuring of Imported Materials',       period: '08/07/24–22/07/24', start: '2024-07-08', end: '2024-07-22', type: 'design',  section: 'design' },
  { id: 'procLoc',  label: 'Procuring of Local Material',           period: '19/07/24–24/07/24', start: '2024-07-19', end: '2024-07-24', type: 'design',  section: 'design' },
  { id: 'cdr',      label: 'Critical Design Review (CDR)',          period: '19/07/24–19/08/24', start: '2024-07-19', end: '2024-08-19', type: 'design',  section: 'design' },
  { id: 'delLoc',   label: 'Delivery of Local Materials to Site',   period: '22/08/24–30/08/24', start: '2024-08-22', end: '2024-08-30', type: 'design',  section: 'design' },
  { id: 'cabling',  label: 'Cabling and Masonry Work',              period: '27/08/24–13/12/24', start: '2024-08-27', end: '2024-12-13', type: 'design',  section: 'design' },
  { id: 'sec2',     label: 'INSTALLATION',                          period: '',                  start: null,        end: null,        type: 'section', section: null },
  { id: 'install',  label: 'Installation of CCTV and Access Control', period: '12/02/25–05/05/25', start: '2025-02-12', end: '2025-05-05', type: 'install', section: 'install' },
  { id: 'fat',      label: 'FAT Training',                          period: '22/03/25–02/04/25', start: '2025-03-22', end: '2025-04-02', type: 'install', section: 'install' },
  { id: 'config',   label: 'Configuration and Testing',             period: '30/05/25–12/02/26', start: '2025-05-30', end: '2026-02-12', type: 'other',  section: 'install' },
  { id: 'commiss',  label: 'Commissioning',                         period: '29/03/26–02/04/26', start: '2026-03-29', end: '2026-04-02', type: 'install', section: 'install' },
];

// ── TIMELINE SETUP ──
// Build array of months from projectStart to projectEnd
function monthsBetween(a, b) {
  const months = [];
  let cur = new Date(a.getFullYear(), a.getMonth(), 1);
  const end = new Date(b.getFullYear(), b.getMonth(), 1);
  while (cur <= end) {
    months.push(new Date(cur));
    cur = new Date(cur.getFullYear(), cur.getMonth() + 1, 1);
  }
  return months;
}

const months = monthsBetween(projectStart, projectEnd); // 23 months
const WEEK_W = 50; // px per "week slot" (4 per month)
const TOTAL_COLS = months.length * 4;
const TOTAL_W = TOTAL_COLS * WEEK_W;

// map a date to pixel offset from start
function dateToX(dateStr) {
  const d = new Date(dateStr);
  const msPerPx = (projectEnd - projectStart) / TOTAL_W;
  return Math.max(0, (d - projectStart) / msPerPx);
}

function monthLabel(d) {
  return d.toLocaleString('en', { month: 'short' }).toUpperCase() + ' ' + String(d.getFullYear()).slice(2);
}

const COLORS = { design: 'var(--bar-design)', install: 'var(--bar-install)', other: 'var(--bar-other)', section: 'transparent' };

// ── BUILD STATS ──
const statsRow = document.getElementById('statsRow');

// calc overall progress
const allDates = tasks.filter(t => t.start && t.end);
const projStartDate = new Date(allDates[0].start);
const projEndDate = new Date(allDates[allDates.length - 1].end);
const totalDuration = projEndDate - projStartDate;
const elapsed = today - projStartDate;
const pct = Math.min(100, Math.max(0, Math.round(elapsed / totalDuration * 100)));

// count tasks
const taskCount = tasks.filter(t => t.type !== 'section').length;
const completedCount = tasks.filter(t => t.end && new Date(t.end) < today && t.type !== 'section').length;
const inProgressCount = tasks.filter(t => t.start && t.end && new Date(t.start) <= today && new Date(t.end) >= today).length;

statsRow.innerHTML = `
  <div class="stat"><div class="stat-value">${taskCount}</div><div class="stat-label">Total Activities</div></div>
  <div class="divider"></div>
  <div class="stat"><div class="stat-value" style="color:var(--accent3)">${completedCount}</div><div class="stat-label">Completed</div></div>
  <div class="divider"></div>
  <div class="stat"><div class="stat-value" style="color:var(--accent2)">${inProgressCount}</div><div class="stat-label">In Progress</div></div>
  <div class="divider"></div>
  <div class="stat"><div class="stat-value" style="color:var(--today)">${taskCount - completedCount - inProgressCount}</div><div class="stat-label">Upcoming</div></div>
  <div class="divider"></div>
  <div class="progress-bar-wrap">
    <div class="progress-label"><span>OVERALL PROGRESS</span><span>${pct}%</span></div>
    <div class="progress-track"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
  </div>
`;

setTimeout(() => { document.getElementById('progFill').style.width = pct + '%'; }, 200);

// ── BUILD CHART ──
const container = document.getElementById('chartContainer');
const todayX = dateToX(today.toISOString().slice(0,10));

// Month header
const monthHeaderRow = document.createElement('div');
monthHeaderRow.style.cssText = `display:flex;margin-left:${260+50}px;border-bottom:1px solid var(--border);`;
months.forEach(m => {
  const isToday = m.getFullYear() === today.getFullYear() && m.getMonth() === today.getMonth();
  const cell = document.createElement('div');
  cell.style.cssText = `flex:none;width:${WEEK_W*4}px;text-align:center;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;color:${isToday ? 'var(--today)' : 'var(--muted)'};letter-spacing:1px;text-transform:uppercase;padding:6px 2px;border-right:1px solid var(--border);`;
  cell.textContent = monthLabel(m);
  monthHeaderRow.appendChild(cell);
});
container.appendChild(monthHeaderRow);

// Week subheader
const weekHeaderRow = document.createElement('div');
weekHeaderRow.style.cssText = `display:flex;margin-left:${260+50}px;border-bottom:1px solid var(--border);`;
months.forEach(m => {
  [1,2,3,4].forEach(w => {
    const wk = document.createElement('div');
    wk.style.cssText = `flex:none;width:${WEEK_W}px;text-align:center;font-family:'DM Mono',monospace;font-size:9px;color:#363d52;padding:3px 0;border-right:1px solid var(--border);`;
    wk.textContent = `W${w}`;
    weekHeaderRow.appendChild(wk);
  });
});
container.appendChild(weekHeaderRow);

// Task rows
tasks.forEach(task => {
  const row = document.createElement('div');
  row.style.cssText = `display:flex;align-items:center;border-bottom:1px solid var(--border);min-height:${task.type === 'section' ? 32 : 44}px;position:relative;`;
  if (task.type === 'section') row.style.background = 'var(--surface2)';

  // Label
  const label = document.createElement('div');
  label.style.cssText = `flex:none;width:260px;padding:0 16px 0 0;font-size:${task.type === 'section' ? 9 : 12}px;font-weight:${task.type === 'section' ? 700 : 500};color:${task.type === 'section' ? 'var(--muted)' : 'var(--text)'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;position:sticky;left:0;z-index:2;background:${task.type === 'section' ? 'var(--surface2)' : 'var(--bg)'};letter-spacing:${task.type === 'section' ? '1.5px' : 'normal'};text-transform:${task.type === 'section' ? 'uppercase' : 'none'};`;
  label.textContent = task.label;
  row.appendChild(label);

  // Period
  const period = document.createElement('div');
  period.style.cssText = `flex:none;width:50px;font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);text-align:right;padding-right:8px;white-space:nowrap;overflow:hidden;position:sticky;left:260px;z-index:2;background:${task.type === 'section' ? 'var(--surface2)' : 'var(--bg)'};`;
  period.textContent = '';
  row.appendChild(period);

  // Grid area
  const grid = document.createElement('div');
  grid.style.cssText = `display:flex;flex:1;position:relative;height:${task.type === 'section' ? 32 : 44}px;align-items:center;`;

  // Grid columns (vertical lines)
  months.forEach((m, mi) => {
    [1,2,3,4].forEach((w, wi) => {
      const col = document.createElement('div');
      col.style.cssText = `flex:none;width:${WEEK_W}px;height:100%;border-right:1px solid var(--border);`;
      grid.appendChild(col);
    });
  });

  // Today marker line
  const tLine = document.createElement('div');
  tLine.style.cssText = `position:absolute;top:0;bottom:0;left:${todayX}px;width:2px;background:rgba(249,212,79,0.5);z-index:5;pointer-events:none;`;
  grid.appendChild(tLine);

  // Bar
  if (task.start && task.end) {
    const x1 = dateToX(task.start);
    const x2 = dateToX(task.end);
    const w = Math.max(x2 - x1, 8);
    const isDone = new Date(task.end) < today;
    const isActive = new Date(task.start) <= today && new Date(task.end) >= today;

    const bar = document.createElement('div');
    bar.style.cssText = `
      position:absolute;
      left:${x1}px;
      width:${w}px;
      height:22px;
      border-radius:4px;
      top:50%;
      transform:translateY(-50%);
      z-index:3;
      cursor:pointer;
      transition:filter 0.2s, height 0.2s;
      background:${COLORS[task.type]};
      opacity:${isDone ? 0.45 : 1};
    `;
    if (isActive) {
      bar.style.boxShadow = `0 0 12px ${COLORS[task.type]}`;
    }

    bar.addEventListener('mouseenter', e => {
      bar.style.height = '26px';
      bar.style.filter = 'brightness(1.2)';
      const tt = document.getElementById('tooltip');
      document.getElementById('ttTitle').textContent = task.label;
      document.getElementById('ttPeriod').textContent = task.period;
      tt.classList.add('visible');
    });
    bar.addEventListener('mousemove', e => {
      const tt = document.getElementById('tooltip');
      tt.style.left = (e.clientX + 14) + 'px';
      tt.style.top  = (e.clientY - 10) + 'px';
    });
    bar.addEventListener('mouseleave', () => {
      bar.style.height = '22px';
      bar.style.filter = '';
      document.getElementById('tooltip').classList.remove('visible');
    });

    grid.appendChild(bar);

    // Progress fill on active bar
    if (isActive) {
      const elapsed = today - new Date(task.start);
      const total = new Date(task.end) - new Date(task.start);
      const fill = document.createElement('div');
      fill.style.cssText = `
        position:absolute;
        left:${x1}px;
        width:${Math.min(w, w * elapsed / total)}px;
        height:22px;
        border-radius:4px 0 0 4px;
        top:50%;
        transform:translateY(-50%);
        z-index:4;
        pointer-events:none;
        background:rgba(255,255,255,0.15);
      `;
      grid.appendChild(fill);
    }
  }

  row.appendChild(grid);
  container.appendChild(row);
});
</script>
</body>
</html>
