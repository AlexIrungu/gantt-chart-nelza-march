<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Programme — KP1/9A.2/0T/045/SS/23-24</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Mono:wght@400;500&family=Mulish:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #f7f3ee;
    --surface:  #ffffff;
    --surface2: #efe9e0;
    --border:   #ddd5c8;
    --border2:  #ccc3b5;
    --text:     #34454c;
    --muted:    #a09585;
    --a1:       #ae5224;
    --a2:       #d48a50;
    --a3:       #2a8c6e;
    --today:    #34454c;
    --LW:       260px;
    --PW:       54px;
    --WW:       36px;
    --RH:       46px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Mulish', sans-serif; min-height: 100vh; }

  .page-header {
    background: var(--surface);
    border-bottom: 2px solid var(--border2);
    padding: 18px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }
  .hdr-left { display: flex; align-items: center; gap: 20px; }
  .hdr-logo { height: 58px; width: auto; }
  .hdr-divider { width: 1px; height: 44px; background: var(--border2); }
  .hdr-text h1 { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 700; color: var(--text); }
  .hdr-text p { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 4px; letter-spacing: 0.4px; }
  .hdr-right { display: flex; gap: 18px; align-items: center; flex-wrap: wrap; }
  .leg { display: flex; align-items: center; gap: 7px; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); }
  .leg-dot { width: 12px; height: 8px; border-radius: 2px; flex-shrink: 0; }

  .stats-bar {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 14px 40px;
    display: flex;
    gap: 0;
    align-items: stretch;
  }
  .stat { padding: 0 24px 0 0; margin-right: 24px; border-right: 1px solid var(--border2); display: flex; flex-direction: column; gap: 3px; }
  .stat:last-child { border-right: none; }
  .stat-v { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: var(--a1); line-height: 1; }
  .stat-l { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); letter-spacing: 0.8px; text-transform: uppercase; }
  .prog-wrap { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 6px; max-width: 260px; margin-left: 8px; }
  .prog-lbl { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); letter-spacing: 0.8px; text-transform: uppercase; display: flex; justify-content: space-between; }
  .prog-track { height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .prog-fill { height: 100%; background: linear-gradient(90deg, var(--a1), var(--a2)); border-radius: 99px; transition: width 1.2s cubic-bezier(.4,0,.2,1); }

  .chart-outer { padding: 20px 40px 48px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .chart-wrap { position: relative; padding-top: 22px; }
  .chart { display: flex; flex-direction: column; width: max-content; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }

  .row { display: flex; align-items: center; border-bottom: 1px solid var(--border); min-height: var(--RH); transition: background 0.12s; }
  .row:last-child { border-bottom: none; }
  .row:hover { background: rgba(174,82,36,0.03); }
  .row.sec { background: var(--surface2); min-height: 30px; }

  .row-lbl {
    flex: none; width: var(--LW); padding: 0 12px 0 18px;
    font-size: 12px; font-weight: 600; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    position: sticky; left: 0; background: var(--surface); z-index: 3;
    border-right: 1px solid var(--border);
  }
  .row.sec .row-lbl {
    background: var(--surface2);
    font-family: 'DM Mono', monospace; font-size: 9px; font-weight: 700;
    letter-spacing: 1.8px; text-transform: uppercase; color: var(--a1);
  }
  .row-per {
    flex: none; width: var(--PW);
    font-family: 'DM Mono', monospace; font-size: 7.5px; color: var(--muted);
    text-align: center; padding: 0 4px; line-height: 1.4;
    position: sticky; left: var(--LW); background: var(--surface); z-index: 3;
    border-right: 1px solid var(--border2);
  }
  .row.sec .row-per { background: var(--surface2); }

  .grid { display: flex; flex: 1; position: relative; height: var(--RH); align-items: center; }
  .row.sec .grid { height: 30px; }
  .gcol { flex: none; width: var(--WW); height: 100%; border-right: 1px solid var(--border); }
  .gcol.mb { border-right: 1px solid var(--border2); }
  .gcol.tc { background: rgba(52,69,76,0.05); border-right: 1px solid rgba(52,69,76,0.25); }

  .bar {
    position: absolute; height: 20px; border-radius: 3px;
    top: 50%; transform: translateY(-50%); z-index: 2; cursor: pointer;
    transition: height 0.15s, filter 0.15s;
  }
  .bar:hover { height: 26px; filter: brightness(0.88); }
  .bar.done { opacity: 0.35; }
  .bar.active { height: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.12); }

  .today-line { position: absolute; top: 0; bottom: 0; width: 1.5px; background: var(--today); z-index: 6; pointer-events: none; }
  .today-lbl { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); font-family: 'DM Mono', monospace; font-size: 8px; color: var(--today); letter-spacing: 1px; white-space: nowrap; font-weight: 700; }

  .tooltip {
    display: none; position: fixed;
    background: var(--surface); border: 1px solid var(--border2);
    padding: 10px 14px; border-radius: 6px;
    font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text);
    pointer-events: none; z-index: 1000;
    box-shadow: 0 6px 20px rgba(52,69,76,0.12); max-width: 260px;
  }
  .tooltip.on { display: block; }
  .tt-name { font-family: 'Mulish', sans-serif; font-weight: 700; font-size: 12px; margin-bottom: 4px; }
  .tt-per { color: var(--muted); font-size: 10px; }
  .tt-st { margin-top: 5px; font-size: 10px; font-weight: 700; }
</style>
</head>
<body>

<div class="page-header">
  <div class="hdr-left">
    <img src="logo.jpeg" alt="Edson Conveyors Ltd" class="hdr-logo" />
    <div class="hdr-divider"></div>
    <div class="hdr-text">
      <h1>CCTV &amp; Access Control — Work Programme</h1>
      <p>REF: KP1/9A.2/0T/045/SS/23-24 &nbsp;·&nbsp; JUNE 2024 – APRIL 2026</p>
    </div>
  </div>
  <div class="hdr-right">
    <div class="leg"><div class="leg-dot" style="background:#ae5224"></div>Design &amp; Procurement</div>
    <div class="leg"><div class="leg-dot" style="background:#d48a50"></div>Installation</div>
    <div class="leg"><div class="leg-dot" style="background:#2a8c6e"></div>Config &amp; Testing</div>
    <div class="leg"><div class="leg-dot" style="background:#34454c;width:2px;height:14px;border-radius:1px"></div>Today</div>
  </div>
</div>

<div class="stats-bar" id="statsBar"></div>

<div class="chart-outer">
  <div class="chart-wrap">
    <div class="chart" id="chart"></div>
  </div>
</div>

<div class="tooltip" id="tt">
  <div class="tt-name" id="ttName"></div>
  <div class="tt-per" id="ttPer"></div>
  <div class="tt-st" id="ttSt"></div>
</div>

<script>
const pStart = new Date('2024-06-01');
const pEnd   = new Date('2026-04-30');
const today  = new Date('2026-03-28');
const WW     = 36; // px per week column

const tasks = [
  { label:'Project Kick-Off Meeting & Handover',    period:'03/06/24–19/06/24', s:'2024-06-03', e:'2024-06-19', type:'other'   },
  { label:'DESIGN & PROCUREMENT',                    period:'',                  s:null,         e:null,         type:'section' },
  { label:'Preliminary Design Review (PDR)',          period:'24/06/24–05/07/24', s:'2024-06-24', e:'2024-07-05', type:'design'  },
  { label:'Procuring of Imported Materials',          period:'08/07/24–22/07/24', s:'2024-07-08', e:'2024-07-22', type:'design'  },
  { label:'Procuring of Local Material',              period:'19/07/24–24/07/24', s:'2024-07-19', e:'2024-07-24', type:'design'  },
  { label:'Critical Design Review (CDR)',             period:'19/07/24–19/08/24', s:'2024-07-19', e:'2024-08-19', type:'design'  },
  { label:'Delivery of Local Materials to Site',      period:'22/08/24–30/08/24', s:'2024-08-22', e:'2024-08-30', type:'design'  },
  { label:'Cabling and Masonry Work',                 period:'27/08/24–13/12/24', s:'2024-08-27', e:'2024-12-13', type:'design'  },
  { label:'INSTALLATION',                             period:'',                  s:null,         e:null,         type:'section' },
  { label:'Installation of CCTV and Access Control',  period:'12/02/25–05/05/25', s:'2025-02-12', e:'2025-05-05', type:'install' },
  { label:'FAT Training',                             period:'22/03/25–02/04/25', s:'2025-03-22', e:'2025-04-02', type:'install' },
  { label:'Configuration and Testing',                period:'30/05/25–12/02/26', s:'2025-05-30', e:'2026-02-12', type:'other'   },
  { label:'Commissioning',                            period:'29/03/26–02/04/26', s:'2026-03-29', e:'2026-04-02', type:'install' },
];

const COLORS = { design:'#ae5224', install:'#d48a50', other:'#2a8c6e', section:'transparent' };

function monthsBetween(a, b) {
  const arr = [];
  let c = new Date(a.getFullYear(), a.getMonth(), 1);
  const end = new Date(b.getFullYear(), b.getMonth(), 1);
  while (c <= end) { arr.push(new Date(c)); c = new Date(c.getFullYear(), c.getMonth()+1, 1); }
  return arr;
}

const months = monthsBetween(pStart, pEnd);
const TOTAL_W = months.length * 4 * WW;

function toX(ds) {
  return Math.max(0, (new Date(ds) - pStart) / (pEnd - pStart) * TOTAL_W);
}

function mLabel(d) {
  return d.toLocaleString('en',{month:'short'}).toUpperCase() + ' ' + String(d.getFullYear()).slice(2);
}

// Stats
const active_tasks = tasks.filter(t => t.type !== 'section');
const done     = active_tasks.filter(t => t.e && new Date(t.e) < today).length;
const inprog   = active_tasks.filter(t => t.s && t.e && new Date(t.s) <= today && new Date(t.e) >= today).length;
const upcoming = active_tasks.length - done - inprog;
const dateTasks = active_tasks.filter(t => t.s && t.e);
const ps = new Date(dateTasks[0].s), pe = new Date(dateTasks[dateTasks.length-1].e);
const pct = Math.min(100, Math.max(0, Math.round((today-ps)/(pe-ps)*100)));

document.getElementById('statsBar').innerHTML = `
  <div class="stat"><div class="stat-v">${active_tasks.length}</div><div class="stat-l">Activities</div></div>
  <div class="stat"><div class="stat-v" style="color:#2a8c6e">${done}</div><div class="stat-l">Completed</div></div>
  <div class="stat"><div class="stat-v" style="color:#ae5224">${inprog}</div><div class="stat-l">In Progress</div></div>
  <div class="stat"><div class="stat-v" style="color:#7a8e94">${upcoming}</div><div class="stat-l">Upcoming</div></div>
  <div class="prog-wrap">
    <div class="prog-lbl"><span>Overall Progress</span><span>${pct}%</span></div>
    <div class="prog-track"><div class="prog-fill" id="pf" style="width:0%"></div></div>
  </div>`;
setTimeout(() => { document.getElementById('pf').style.width = pct + '%'; }, 300);

// Build chart
const chart = document.getElementById('chart');
const LW = 260, PW = 54;
const todayX = toX(today.toISOString().slice(0,10));

// Month header row
const mRow = document.createElement('div');
mRow.style.cssText = `display:flex;margin-left:${LW+PW}px;border-bottom:1px solid var(--border);background:var(--surface2);`;
months.forEach(m => {
  const isCur = m.getFullYear()===today.getFullYear() && m.getMonth()===today.getMonth();
  const c = document.createElement('div');
  c.style.cssText = `flex:none;width:${WW*4}px;text-align:center;font-family:'DM Mono',monospace;font-size:9px;font-weight:${isCur?700:500};color:${isCur?'var(--a1)':'var(--muted)'};letter-spacing:1px;text-transform:uppercase;padding:6px 2px;border-right:1px solid var(--border);`;
  c.textContent = mLabel(m);
  mRow.appendChild(c);
});
chart.appendChild(mRow);

// Week sub-header
const wRow = document.createElement('div');
wRow.style.cssText = `display:flex;margin-left:${LW+PW}px;border-bottom:2px solid var(--border2);background:var(--surface2);`;
months.forEach(() => {
  [1,2,3,4].forEach(w => {
    const wc = document.createElement('div');
    wc.style.cssText = `flex:none;width:${WW}px;text-align:center;font-family:'DM Mono',monospace;font-size:7.5px;color:var(--border2);padding:3px 0;border-right:1px solid var(--border);`;
    wc.textContent = `W${w}`;
    wRow.appendChild(wc);
  });
});
chart.appendChild(wRow);

// Task rows
tasks.forEach(t => {
  const isSec = t.type === 'section';
  const row = document.createElement('div');
  row.className = 'row' + (isSec ? ' sec' : '');

  const lbl = document.createElement('div');
  lbl.className = 'row-lbl';
  lbl.textContent = t.label;
  lbl.title = t.label;
  row.appendChild(lbl);

  const per = document.createElement('div');
  per.className = 'row-per';
  if (!isSec && t.period) {
    const pts = t.period.split('–');
    per.innerHTML = pts.length===2 ? pts[0]+'<br>'+pts[1] : t.period;
  }
  row.appendChild(per);

  const grid = document.createElement('div');
  grid.className = 'grid';

  months.forEach((m, mi) => {
    [1,2,3,4].forEach((w, wi) => {
      const gc = document.createElement('div');
      let cls = 'gcol';
      if (wi === 3) cls += ' mb';
      // mark today column
      const colStartMs = pStart.getTime() + (mi*4+wi) * (TOTAL_W / (months.length*4)) / TOTAL_W * (pEnd-pStart);
      gc.className = cls;
      grid.appendChild(gc);
    });
  });

  // Today line
  const tl = document.createElement('div');
  tl.className = 'today-line';
  tl.style.left = todayX + 'px';
  if (!isSec) {
    const tlbl = document.createElement('div');
    tlbl.className = 'today-lbl';
    tlbl.textContent = 'TODAY';
    tl.appendChild(tlbl);
  }
  grid.appendChild(tl);

  // Bar
  if (t.s && t.e) {
    const x1 = toX(t.s);
    const x2 = toX(t.e);
    const bw = Math.max(x2-x1, 5);
    const isDone   = new Date(t.e) < today;
    const isActive = new Date(t.s) <= today && new Date(t.e) >= today;

    const bar = document.createElement('div');
    bar.className = 'bar' + (isDone?' done':'') + (isActive?' active':'');
    bar.style.cssText = `left:${x1}px;width:${bw}px;background:${COLORS[t.type]};`;

    if (isActive) {
      const ratio = Math.min(1, (today-new Date(t.s))/(new Date(t.e)-new Date(t.s)));
      bar.style.background = `linear-gradient(90deg, ${COLORS[t.type]} ${ratio*100}%, ${COLORS[t.type]}66 ${ratio*100}%)`;
    }

    bar.addEventListener('mouseenter', () => {
      document.getElementById('ttName').textContent = t.label;
      document.getElementById('ttPer').textContent = t.period;
      const [stxt, scol] = isDone ? ['✓ Completed','#2a8c6e'] : isActive ? ['◉ In Progress','#ae5224'] : ['○ Upcoming','#a09585'];
      const el = document.getElementById('ttSt');
      el.textContent = stxt; el.style.color = scol;
      document.getElementById('tt').classList.add('on');
    });
    bar.addEventListener('mousemove', e => {
      const tt = document.getElementById('tt');
      tt.style.left = (e.clientX+14)+'px';
      tt.style.top  = (e.clientY-10)+'px';
    });
    bar.addEventListener('mouseleave', () => document.getElementById('tt').classList.remove('on'));
    grid.appendChild(bar);
  }

  row.appendChild(grid);
  chart.appendChild(row);
});
</script>
</body>
</html>
